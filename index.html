<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Calendar</title>
</head>
<body>
    <main class="calendar">
        <header>
            <button id="previous-month">Prev.</button>
            <h2 id="month-year">April 2024</h2>
            <button id="next-month">Next</button>
        </header>
        <section class="weekdays">
            <div>Sun</div>
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thr</div>
            <div>Fri</div>
            <div>Sat</div>
        </section>
        <div class="days">

        </div>
    </main>
    <aside class="notebook" style="display: none;">
            <!--<p id="notes" contenteditable="true">Teste</p>-->
    </aside>
    
</body>
<script src="scripts.js"></script>
</html>
